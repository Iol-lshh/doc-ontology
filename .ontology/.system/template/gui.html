<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ontology GUI</title>
  <link rel="stylesheet" href="statics/styles.css" />
</head>
<body>
  <header>
    <h1>Ontology GUI</h1>
    <span id="status">연결 확인 중…</span>
  </header>

  <nav id="tabs">
    <button data-tab="filepath" class="active">파일 구조도</button>
    <button data-tab="graph">그래프</button>
    <button data-tab="history">히스토리</button>
    <button data-tab="document">본문</button>
    <button data-tab="diff">비교</button>
  </nav>

  <div class="actions">
    <button data-cmd="build-ontology">빌드</button>
    <button data-cmd="save">저장</button>
    <button data-cmd="rollback">롤백</button>
  </div>

  <main>
    <section class="tab active" data-tab="filepath"><file-path-view data-view></file-path-view></section>
    <section class="tab" data-tab="graph"><graph-view data-view></graph-view></section>
    <section class="tab" data-tab="history"><history-view data-view></history-view></section>
    <section class="tab" data-tab="document"><document-view data-view></document-view></section>
    <section class="tab" data-tab="diff"><diff-view data-view></diff-view></section>
  </main>

  <div id="log"></div>

  <script type="module" src="statics/app.js"></script>
</body>
</html>
